# Candle Store Config
# Downloads and caches OHLCV bars per symbol/timeframe to JSON files.

symbols:
  - "ES=F"    # E-mini S&P 500 futures
  - "NQ=F"    # E-mini Nasdaq futures

timeframes:
  - interval: "1m"
    period: "5d"
  - interval: "5m"
    period: "1mo"
  - interval: "15m"
    period: "1mo"
  - interval: "1h"
    period: "3mo"
  - interval: "1d"
    period: "1y"

retention_bars: 200
data_dir: "execution/market_data/data"
